<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cowlace — Cattle Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: 320px;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar h1 {
      padding: 16px 20px;
      font-size: 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #sidebar h1 span { font-size: 24px; }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid #333;
    }
    .tab-bar button {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
    }
    .tab-bar button.active {
      color: #4ade80;
      border-bottom-color: #4ade80;
    }

    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .panel[hidden] { display: none; }

    /* Device cards */
    .device-card {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .device-card:hover { border-color: #4ade80; }
    .device-card.selected { border-color: #4ade80; }
    .device-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .device-meta {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 12px;
    }
    .device-meta .online { color: #4ade80; }
    .device-meta .offline { color: #ef4444; }

    /* Alert cards */
    .alert-card {
      background: #16213e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 13px;
      border-left: 3px solid #f59e0b;
    }
    .alert-card.geofence { border-left-color: #ef4444; }
    .alert-card.battery { border-left-color: #f59e0b; }
    .alert-card.tamper { border-left-color: #8b5cf6; }
    .alert-time { color: #666; font-size: 11px; margin-top: 4px; }

    /* Status bar */
    #status-bar {
      padding: 8px 12px;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #333;
    }

    /* Map */
    #map { flex: 1; }

    /* Trail info popup */
    .trail-toggle {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 6px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #sidebar { width: 100%; height: 40vh; }
      #map { height: 60vh; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1><span>&#x1F404;</span> Cowlace</h1>
      <div class="tab-bar">
        <button class="active" onclick="showTab('devices')">Cattle</button>
        <button onclick="showTab('alerts')">Alerts</button>
      </div>
      <div class="panel" id="devices-panel"></div>
      <div class="panel" id="alerts-panel" hidden></div>
      <div id="status-bar">Loading...</div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // --- Map setup ---
    const map = L.map('map').setView([17.385, 78.4867], 10); // Hyderabad default
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(map);

    const markers = {};    // device_id -> L.marker
    const trails = {};     // device_id -> L.polyline
    let selectedDevice = null;

    // Cow icon
    const cowIcon = L.divIcon({
      html: '<div style="font-size:28px;text-align:center;">&#x1F404;</div>',
      iconSize: [32, 32],
      iconAnchor: [16, 16],
      className: '',
    });

    // --- Tabs ---
    function showTab(name) {
      document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.hidden = true);
      document.getElementById(`${name}-panel`).hidden = false;
      event.target.classList.add('active');
    }

    // --- Fetch & render devices ---
    async function loadDevices() {
      try {
        const res = await fetch('/api/devices');
        const devices = await res.json();
        renderDeviceList(devices);
        updateMarkers(devices);
        document.getElementById('status-bar').textContent =
          `${devices.length} device(s) | Last refresh: ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        document.getElementById('status-bar').textContent = `Error: ${err.message}`;
      }
    }

    function renderDeviceList(devices) {
      const panel = document.getElementById('devices-panel');
      panel.innerHTML = devices.map(d => {
        const isOnline = d.last_seen && (Date.now() - new Date(d.last_seen).getTime()) < 30 * 60 * 1000;
        const statusClass = isOnline ? 'online' : 'offline';
        const statusText = isOnline ? 'Online' : (d.last_seen ? timeAgo(d.last_seen) : 'Never seen');
        const selected = selectedDevice === d.id ? 'selected' : '';
        return `
          <div class="device-card ${selected}" onclick="selectDevice(${d.id}, ${d.lat}, ${d.lng})">
            <div class="device-name">${d.name || d.imei}</div>
            <div class="device-meta">
              <span class="${statusClass}">${statusText}</span>
              ${d.battery != null ? `<span>&#x1F50B; ${d.battery}%</span>` : ''}
              ${d.speed != null ? `<span>${d.speed} km/h</span>` : ''}
              ${d.satellites != null ? `<span>${d.satellites} sats</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function updateMarkers(devices) {
      const bounds = [];
      devices.forEach(d => {
        if (d.lat == null || d.lng == null) return;
        bounds.push([d.lat, d.lng]);

        if (markers[d.id]) {
          markers[d.id].setLatLng([d.lat, d.lng]);
        } else {
          markers[d.id] = L.marker([d.lat, d.lng], { icon: cowIcon })
            .addTo(map)
            .bindPopup(`
              <b>${d.name || d.imei}</b><br>
              ${d.lat.toFixed(6)}, ${d.lng.toFixed(6)}<br>
              Speed: ${d.speed || 0} km/h<br>
              ${d.battery != null ? `Battery: ${d.battery}%<br>` : ''}
              Last seen: ${d.last_seen ? new Date(d.last_seen).toLocaleString() : 'N/A'}<br>
              <button class="trail-toggle" onclick="toggleTrail(${d.id})">Show trail (24h)</button>
            `);
        }
      });
      if (bounds.length > 0 && !selectedDevice) {
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
      }
    }

    // --- Device selection & trail ---
    function selectDevice(deviceId, lat, lng) {
      selectedDevice = deviceId;
      if (lat && lng) map.setView([lat, lng], 15);
      loadDevices(); // re-render list with selection
    }

    async function toggleTrail(deviceId) {
      if (trails[deviceId]) {
        map.removeLayer(trails[deviceId]);
        delete trails[deviceId];
        return;
      }
      try {
        const res = await fetch(`/api/positions/${deviceId}/history?hours=24`);
        const positions = await res.json();
        if (positions.length === 0) return alert('No position history');
        const latlngs = positions.map(p => [p.lat, p.lng]);
        trails[deviceId] = L.polyline(latlngs, {
          color: '#4ade80',
          weight: 3,
          opacity: 0.8,
        }).addTo(map);
        map.fitBounds(trails[deviceId].getBounds(), { padding: [50, 50] });
      } catch (err) {
        alert('Failed to load trail: ' + err.message);
      }
    }

    // --- Alerts ---
    async function loadAlerts() {
      try {
        const res = await fetch('/api/alerts?limit=50');
        const alerts = await res.json();
        const panel = document.getElementById('alerts-panel');
        if (alerts.length === 0) {
          panel.innerHTML = '<p style="color:#666;padding:20px;text-align:center;">No alerts yet</p>';
          return;
        }
        panel.innerHTML = alerts.map(a => `
          <div class="alert-card ${a.type}">
            <strong>${a.device_name}</strong>: ${a.message || a.type}
            <div class="alert-time">${new Date(a.created_at).toLocaleString()}</div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load alerts:', err);
      }
    }

    // --- Helpers ---
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    // --- Auto-refresh ---
    loadDevices();
    loadAlerts();
    setInterval(loadDevices, 30000);  // refresh every 30s
    setInterval(loadAlerts, 60000);   // refresh every 60s
  </script>
</body>
</html>
